<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План · Риелтор</title>
    <style>
        /* ──────────────────────────────────────────
           Realtor Day Planner · dark design
           ────────────────────────────────────────── */
        :root {
            --bg-canvas: #111113;
            --bg-surface: #1a1a1e;
            --bg-raised: #232327;
            --bg-sidebar: #17171b;
            --text-title:  #f0f0f0;
            --text-body:   #d4d4d4;
            --text-muted:  #8a8a8a;
            --text-dim:    #5e5e66;
            --accent:      #7c5cfc;
            --accent-dim:  rgba(124, 92, 252, 0.10);
            --accent-glow: rgba(124, 92, 252, 0.20);
            --border:      #2c2c32;
            --border-focus:#4a4a54;
            --green:       #34d399;
            --green-dim:   rgba(52, 211, 153, 0.12);
            --amber:       #fbbf24;
            --amber-dim:   rgba(251, 191, 36, 0.12);
            --red:         #f87171;
            --red-dim:     rgba(248, 113, 113, 0.12);
            --font:        'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-ui:     -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 14px;
            --space-lg: 20px;
            --space-xl: 28px;
            --radius:    10px;
            --radius-sm: 6px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg-canvas);
            color: var(--text-body);
            font-family: var(--font);
            line-height: 1.55;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-canvas); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }

        /* ── Layout: sidebar + main + right-panel ───────────────────────── */
        #app {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--space-lg);
            display: flex;
            gap: var(--space-lg);
            min-height: 100vh;
        }

        /* ── Sidebar ──────────────────────────── */
        #sidebar {
            width: 200px;
            min-width: 200px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-md);
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        #sidebar h2 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            padding: var(--space-xs) var(--space-sm);
            margin-bottom: var(--space-xs);
            border-bottom: 1px solid var(--border);
        }
        .task-type-item {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: grab;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-title);
            border: 1px solid transparent;
            transition: all 0.12s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .task-type-item:hover {
            border-color: var(--border-focus);
            background: rgba(255,255,255,0.02);
        }
        .task-type-item:active {
            cursor: grabbing;
            transform: scale(0.97);
        }
        .task-type-item .color-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── Main area ────────────────────────── */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
            min-width: 0;
        }

        /* ── Header ───────────────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--space-md);
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--border);
        }
        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text-title);
        }
        #clock {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--accent);
            background: var(--accent-dim);
            padding: 6px 18px;
            border-radius: 20px;
            letter-spacing: 0.02em;
            border: 1px solid transparent;
        }

        /* ── Objective ────────────────────────── */
        #objective-box {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-md) var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            flex-wrap: wrap;
        }
        #objective-box label {
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.03em;
            color: var(--accent);
            white-space: nowrap;
        }
        #objective-input {
            flex: 1;
            min-width: 200px;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-title);
            font-family: var(--font);
            font-size: 1rem;
            padding: 4px 0;
            caret-color: var(--accent);
        }
        #objective-input::placeholder { color: var(--text-dim); }

        /* ── Config Bar ───────────────────────── */
        #config-bar {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            flex-wrap: wrap;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-sm) var(--space-md);
            font-size: 0.85rem;
        }
        #config-bar label {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        #config-bar select,
        #config-bar input[type="number"] {
            background: var(--bg-raised);
            color: var(--text-title);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px 12px;
            font-family: var(--font-ui);
            font-size: 0.82rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        #config-bar select:focus,
        #config-bar input[type="number"]:focus { border-color: var(--accent); }
        #config-bar input[type="number"] { width: 50px; text-align: center; }
        #config-bar input[type="number"]::-webkit-outer-spin-button,
        #config-bar input[type="number"]::-webkit-inner-spin-button { opacity: 1; height: 28px; }
        #config-bar .sep { color: var(--border); }
        #config-bar .block-count {
            margin-left: auto;
            color: var(--text-dim);
            font-size: 0.75rem;
        }
        #config-bar .block-count span { color: var(--accent); font-weight: 600; }

        /* ── Grid ─────────────────────────────── */
        #workspace {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        #schedule-grid {
            max-height: 60vh;
            overflow-y: auto;
        }
        .row {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.1s;
            min-height: 52px;
        }
        .row:last-child { border-bottom: none; }
        .row:hover { background: rgba(255, 255, 255, 0.02); }
        .row.focused {
            background: var(--accent-dim);
            border-left: 3px solid var(--accent);
            z-index: 1;
        }
        .row.selected {
            background: var(--accent-dim);
            border-left: 3px solid var(--accent);
            z-index: 1;
        }
        .row.focused.selected { background: var(--accent-glow); }
        .row.now {
            box-shadow: inset 0 0 0 1px var(--accent);
            background: rgba(255, 255, 255, 0.01);
        }
        .row.merged { min-height: 50px; }

        .time-col {
            width: 130px;
            min-width: 130px;
            padding: 8px 12px;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            border-right: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.15);
            gap: 6px;
        }
        .time-col .badge {
            font-size: 0.6rem;
            color: var(--accent);
            font-weight: 600;
            background: var(--accent-dim);
            padding: 1px 8px;
            border-radius: 4px;
            margin-left: 4px;
        }
        .drag-handle {
            cursor: grab;
            opacity: 0.45;
            font-size: 1rem;
            line-height: 1;
            user-select: none;
            padding: 0 2px;
            transition: opacity 0.12s;
        }
        .drag-handle:active { cursor: grabbing; opacity: 0.8; }
        .row:hover .drag-handle { opacity: 0.8; }

        /* ── Task Cell ────────────────────────── */
        .task-col {
            flex: 1;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            min-width: 0;
            position: relative;
        }
        .task-type-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            line-height: 1.3;
        }
        .task-desc {
            font-size: 0.85rem;
            color: var(--text-title);
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .task-desc.empty {
            color: var(--text-dim);
            font-style: italic;
            font-size: 0.78rem;
        }
        .task-desc.done {
            color: var(--text-dim);
            text-decoration: line-through;
            text-decoration-color: rgba(255,255,255,0.2);
        }
        .task-desc.blocked { color: #d4b44a; }
        .metric-line {
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .row.has-tasktype {
            border-left: 3px solid transparent;
        }

        /* ── Type colors ──────────────────────── */
        .type-0 { --type-color: #e74c3c; }   /* Встречи */
        .type-1 { --type-color: #3498db; }   /* Показы */
        .type-2 { --type-color: #2ecc71; }   /* Подборы */
        .type-3 { --type-color: #f39c12; }   /* Перезвоны */
        .type-4 { --type-color: #9b59b6; }   /* Соцсети */
        .type-5 { --type-color: #e67e22; }   /* Расклейка */
        .type-6 { --type-color: #1abc9c; }   /* Навыки продаж */
        .type-7 { --type-color: #e91e63; }   /* Звонки */
        .type-8 { --type-color: #f1c40f; }   /* Задатки/сделки */

        .row.type-0 {
            border-left: 3px solid var(--type-color);
            background: rgba(231, 76, 60, 0.07);
        }
        .row.type-1 {
            border-left: 3px solid var(--type-color);
            background: rgba(52, 152, 219, 0.07);
        }
        .row.type-2 {
            border-left: 3px solid var(--type-color);
            background: rgba(46, 204, 113, 0.07);
        }
        .row.type-3 {
            border-left: 3px solid var(--type-color);
            background: rgba(243, 156, 18, 0.07);
        }
        .row.type-4 {
            border-left: 3px solid var(--type-color);
            background: rgba(155, 89, 182, 0.07);
        }
        .row.type-5 {
            border-left: 3px solid var(--type-color);
            background: rgba(230, 126, 34, 0.07);
        }
        .row.type-6 {
            border-left: 3px solid var(--type-color);
            background: rgba(26, 188, 156, 0.07);
        }
        .row.type-7 {
            border-left: 3px solid var(--type-color);
            background: rgba(233, 30, 99, 0.07);
        }
        .row.type-8 {
            border-left: 3px solid var(--type-color);
            background: rgba(241, 196, 15, 0.07);
        }

        .type-label-0 { color: #e74c3c; }
        .type-label-1 { color: #3498db; }
        .type-label-2 { color: #2ecc71; }
        .type-label-3 { color: #f39c12; }
        .type-label-4 { color: #9b59b6; }
        .type-label-5 { color: #e67e22; }
        .type-label-6 { color: #1abc9c; }
        .type-label-7 { color: #e91e63; }
        .type-label-8 { color: #f1c40f; }

        /* Status dot in task cell */
        .status-dot {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.7rem;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.1s;
            position: absolute;
            top: 8px;
            right: 10px;
        }
        .status-dot.s-pending {
            color: var(--text-dim);
            border-color: var(--border-focus);
            background: transparent;
        }
        .status-dot.s-done {
            color: var(--green);
            border-color: var(--green);
            background: var(--green-dim);
        }
        .status-dot.s-blocked {
            color: var(--amber);
            border-color: var(--amber);
            background: var(--amber-dim);
        }

        /* ── Right Panel (Task List) ───────────────────────── */
        #right-panel {
            width: 220px;
            min-width: 220px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-md);
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            height: fit-content;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
        }
        #right-panel h2 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            padding: var(--space-xs) var(--space-sm);
            margin-bottom: var(--space-xs);
            border-bottom: 1px solid var(--border);
        }
        #tasks-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }
        .task-item {
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.75rem;
            border: 1px solid transparent;
            transition: all 0.12s;
            display: flex;
            flex-direction: column;
            gap: 2px;
            background: var(--bg-surface);
        }
        .task-item:hover {
            background: rgba(255,255,255,0.04);
            border-color: var(--border-focus);
        }
        .task-item.active {
            background: var(--accent-dim);
            border-color: var(--accent);
        }
        .task-item-time {
            font-weight: 600;
            color: var(--accent);
            font-size: 0.7rem;
        }
        .task-item-title {
            color: var(--text-title);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
        }
        .task-item-title.empty {
            color: var(--text-dim);
            font-style: italic;
        }
        .task-item-status {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        /* ── Merge Toolbar ────────────────────── */
        #merge-bar {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-raised);
            border: 1px solid var(--border-focus);
            border-radius: 14px;
            padding: 12px 22px;
            display: none;
            align-items: center;
            gap: 14px;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            font-size: 0.85rem;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        #merge-bar.visible { display: flex; }
        #merge-bar .count-label { color: var(--text-muted); }
        #merge-bar .count-label strong { color: var(--accent); }
        #merge-bar button {
            font-family: var(--font-ui);
            font-size: 0.8rem;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid transparent;
            transition: all 0.12s;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover { box-shadow: 0 0 18px var(--accent-glow); }
        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border-color: var(--border);
        }
        .btn-ghost:hover { color: var(--text-title); border-color: var(--text-muted); }

        /* ── Modal ────────────────────────────── */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        #modal-overlay.open { display: flex; }
        #modal {
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: var(--space-xl);
            width: 92%;
            max-width: 520px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }
        #modal h3 {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--accent);
            margin: 0;
        }
        #modal .range { font-size: 0.85rem; color: var(--text-muted); }
        #modal label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 4px;
        }
        #modal input[type="text"],
        #modal select {
            width: 100%;
            background: var(--bg-surface);
            color: var(--text-title);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            font-family: var(--font-ui);
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.15s;
        }
        #modal input[type="text"]:focus,
        #modal select:focus { border-color: var(--accent); }
        #modal .actions {
            display: flex;
            gap: var(--space-sm);
            justify-content: flex-end;
            flex-wrap: wrap;
            margin-top: var(--space-sm);
        }
        #modal .actions button {
            font-family: var(--font-ui);
            font-size: 0.85rem;
            padding: 10px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid transparent;
            transition: all 0.12s;
        }
        .btn-save {
            background: var(--accent);
            color: #fff;
        }
        .btn-save:hover { box-shadow: 0 0 16px var(--accent-glow); }
        .btn-split {
            background: transparent;
            color: var(--amber);
            border-color: rgba(251, 191, 36, 0.5);
        }
        .btn-split:hover { background: var(--amber-dim); border-color: var(--amber); }
        .btn-cancel {
            background: transparent;
            color: var(--text-muted);
            border-color: var(--border);
        }
        .btn-cancel:hover { color: var(--text-title); border-color: var(--text-muted); }
        .btn-delete {
            background: transparent;
            color: var(--red);
            border-color: rgba(248, 113, 113, 0.4);
            margin-right: auto;
        }
        .btn-delete:hover { background: var(--red-dim); border-color: var(--red); }

        /* ── Keyboard Hints ───────────────────── */
        #kbd-hint {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-dim);
            padding: 2px 0;
        }
        #kbd-hint kbd {
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 8px;
            font-family: var(--font-ui);
            font-size: 0.68rem;
            color: var(--text-muted);
        }

        /* ── Dragging overlay ─────────────────── */
        #drag-overlay {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            padding: 6px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 600;
            color: #fff;
            opacity: 0.9;
            display: none;
            white-space: nowrap;
        }

        /* ── Drop indicator ───────────────────── */
        .row.drop-target {
            outline: 2px dashed var(--accent);
            outline-offset: -2px;
        }
        .row.drop-target-source {
            outline: 2px dashed var(--amber);
            outline-offset: -2px;
        }

        /* ── Responsive ───────────────────────── */
        @media (max-width: 1000px) {
            #right-panel {
                display: none;
            }
        }
        @media (max-width: 800px) {
            #app {
                flex-direction: column;
                padding: var(--space-md);
            }
            #sidebar {
                width: 100%;
                min-width: 100%;
                position: static;
                flex-direction: row;
                flex-wrap: wrap;
                padding: var(--space-sm);
                gap: 4px;
            }
            #sidebar h2 {
                width: 100%;
                margin-bottom: 0;
            }
            .task-type-item {
                font-size: 0.75rem;
                padding: 5px 10px;
            }
            .time-col { width: 100px; min-width: 100px; font-size: 0.7rem; padding: 6px 8px; }
            .task-col { padding: 6px 10px; }
            .task-type-label { font-size: 0.65rem; }
            .task-desc { font-size: 0.78rem; }
            #schedule-grid { max-height: 50vh; }
            #modal { padding: var(--space-lg); }
            #merge-bar { bottom: 16px; padding: 10px 16px; gap: 8px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <!-- ── Drag Overlay ── -->
    <div id="drag-overlay"></div>

    <div id="app">
        <!-- ═══ SIDEBAR ═══ -->
        <aside id="sidebar">
            <h2>Типы задач</h2>
            <div id="task-type-list"></div>
        </aside>

        <!-- ═══ MAIN ═══ -->
        <div id="main">
            <!-- ═══ HEADER ═══ -->
            <header>
                <h1>План · Риелтор</h1>
                <div id="clock">00:00</div>
            </header>

            <!-- ═══ OBJECTIVE ═══ -->
            <section id="objective-box">
                <label for="objective-input">✦ Цель дня</label>
                <input type="text" id="objective-input" placeholder="Какая главная цель сегодня?">
            </section>

            <!-- ═══ CONFIG ═══ -->
            <section id="config-bar">
                <label for="interval-select">Интервал</label>
                <select id="interval-select">
                    <option value="5">5 мин</option>
                    <option value="10">10 мин</option>
                    <option value="15">15 мин</option>
                    <option value="30">30 мин</option>
                </select>
                <label for="start-hour">С</label>
                <input type="number" id="start-hour" value="6" min="0" max="23">
                <span class="sep">:</span>
                <span style="color:var(--text-dim);font-size:0.75rem;">00</span>
                <label for="end-hour">До</label>
                <input type="number" id="end-hour" value="22" min="0" max="23">
                <span class="sep">:</span>
                <span style="color:var(--text-dim);font-size:0.75rem;">00</span>
                <span class="block-count">Блоков · <span id="block-count">192</span></span>
            </section>

            <!-- ═══ GRID ═══ -->
            <main id="workspace">
                <div id="schedule-grid">
                    <!-- generated by JS -->
                </div>
            </main>

            <!-- ═══ KEYBOARD HINTS ═══ -->
            <div id="kbd-hint">
                <kbd>↑↓</kbd> Навигация &nbsp;&nbsp;
                <kbd>Enter</kbd> Редактировать &nbsp;&nbsp;
                <kbd>O</kbd> Цель &nbsp;&nbsp;
                <kbd>C</kbd> Настройки &nbsp;&nbsp;
                <kbd>Esc</kbd> Сброс &nbsp;&nbsp;
                Перетащи блоки чтобы объединить &nbsp;&nbsp;
                <kbd>M</kbd> Слить &nbsp;&nbsp;
                <kbd>↕</kbd> ручка ≡ – перенести блок
            </div>
        </div>

        <!-- ═══ RIGHT PANEL (TASK LIST) ═══ -->
        <aside id="right-panel">
            <h2>Все задачи</h2>
            <div id="tasks-list">
                <!-- generated by JS -->
            </div>
        </aside>
    </div>

    <!-- ═══ MERGE TOOLBAR ═══ -->
    <div id="merge-bar">
        <span class="count-label"><strong id="merge-count">0</strong> выбрано</span>
        <button class="btn-primary" id="btn-merge">Объединить</button>
        <button class="btn-ghost" id="btn-merge-cancel">Отмена</button>
    </div>

    <!-- ═══ MODAL ═══ -->
    <div id="modal-overlay">
        <div id="modal">
            <h3>✎ Редактировать блок</h3>
            <div class="range" id="modal-range">08:00 – 08:05</div>

            <label for="modal-tasktype">Тип задачи</label>
            <select id="modal-tasktype">
                <option value="-1">— Без типа —</option>
                <option value="0">Встречи</option>
                <option value="1">Показы</option>
                <option value="2">Подборы</option>
                <option value="3">Перезвоны</option>
                <option value="4">Соцсети</option>
                <option value="5">Расклейка</option>
                <option value="6">Навыки продаж, переговоров</option>
                <option value="7">Звонки</option>
                <option value="8">Задатки/сделки</option>
            </select>

            <label for="modal-task">Задача</label>
            <input type="text" id="modal-task" placeholder="Что нужно сделать?">

            <label for="modal-metric">Успех / Результат</label>
            <input type="text" id="modal-metric" placeholder="Измеримый результат">

            <label for="modal-status">Статус</label>
            <select id="modal-status">
                <option value="pending">В работе</option>
                <option value="completed">Выполнено</option>
                <option value="blocked">Заблокировано</option>
            </select>
            <div class="actions">
                <button class="btn-delete" id="btn-modal-delete">Очистить</button>
                <button class="btn-split" id="btn-modal-split" style="display:none;">Разделить</button>
                <button class="btn-cancel" id="btn-modal-cancel">Отмена</button>
                <button class="btn-save" id="btn-modal-save">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // Realtor Day Planner
            // ──────────────────────────────────────

            const KEY = 'realtor-plan-v1';

            // 9 task types (Russian)
            const TASK_TYPES = [
                { name: 'Встречи',                  color: '#e74c3c' },
                { name: 'Показы',                    color: '#3498db' },
                { name: 'Подборы',                   color: '#2ecc71' },
                { name: 'Перезвоны',                 color: '#f39c12' },
                { name: 'Соцсети',                   color: '#9b59b6' },
                { name: 'Расклейка',                 color: '#e67e22' },
                { name: 'Навыки продаж, переговоров', color: '#1abc9c' },
                { name: 'Звонки',                    color: '#e91e63' },
                { name: 'Задатки/сделки',             color: '#f1c40f' }
            ];

            const DEF = {
                config: { interval: 5, start: 6, end: 22 },
                date: new Date().toISOString().slice(0, 10),
                objective: '',
                blocks: {}
            };

            // ── DOM refs ──────────────────────────
            const $ = s => document.querySelector(s);
            const $$ = s => document.querySelectorAll(s);

            const domClock = $('#clock');
            const domObj = $('#objective-input');
            const domInt = $('#interval-select');
            const domStart = $('#start-hour');
            const domEnd = $('#end-hour');
            const domGrid = $('#schedule-grid');
            const domCnt = $('#block-count');
            const domBar = $('#merge-bar');
            const domMCnt = $('#merge-count');
            const domBMerge = $('#btn-merge');
            const domBCancel = $('#btn-merge-cancel');
            const domModalOverlay = $('#modal-overlay');
            const domMRange = $('#modal-range');
            const domMTaskType = $('#modal-tasktype');
            const domMTask = $('#modal-task');
            const domMMetric = $('#modal-metric');
            const domMStatus = $('#modal-status');
            const domMSave = $('#btn-modal-save');
            const domMCancel = $('#btn-modal-cancel');
            const domMDelete = $('#btn-modal-delete');
            const domMSplit = $('#btn-modal-split');
            const domTypeList = $('#task-type-list');
            const domDragOverlay = $('#drag-overlay');
            const domTasksList = $('#tasks-list');

            // ── State ─────────────────────────────
            let state = load();
            let timeKeys = [];
            let sel = new Set();
            let focused = null;
            let dragStart = null, dragEnd = null, dragging = false, mouseDown = null, mouseDownAt = 0;
            let modalKey = null;
            let dragSourceKey = null; // for block move via drag handle

            // ── Persistence ───────────────────────
            function load() {
                try {
                    const raw = localStorage.getItem(KEY);
                    if (raw) {
                        const p = JSON.parse(raw);
                        return { ...JSON.parse(JSON.stringify(DEF)), ...p,
                            config: { ...DEF.config, ...(p.config || {}) }
                        };
                    }
                } catch (_) {}
                return JSON.parse(JSON.stringify(DEF));
            }

            function save() {
                state.date = new Date().toISOString().slice(0, 10);
                try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (_) {}
            }

            // ── Time helpers ──────────────────────
            function toMin(k) { const [h,m]=k.split(':').map(Number); return h*60+m; }
            function toKey(m) {
                const h = Math.floor(m/60)%24, mm = m%60;
                return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0');
            }
            function add(k, n) { return toKey(toMin(k) + n); }

            function genKeys() {
                const { interval, start, end } = state.config;
                const keys = [];
                for (let m = start*60; m < end*60; m += interval) keys.push(toKey(m));
                return keys;
            }

            function endKey(k, span) { return add(k, (span||1)*state.config.interval); }
            function rangeStr(k, span) { return `${k} – ${endKey(k,span)}`; }

            // ── Build visible ─────────────────────
            function visible() {
                const keys = timeKeys, out = [];
                let skip = 0;
                for (let i=0; i<keys.length; i++) {
                    if (skip > 0) { skip--; continue; }
                    const k = keys[i];
                    const b = state.blocks[k] || { task:'', metric:'', status:'pending', type:-1, span:1 };
                    const span = Math.max(1, Math.min(b.span||1, keys.length-i));
                    skip = span - 1;
                    out.push({ k, task:b.task||'', metric:b.metric||'', status:b.status||'pending', type:b.type!==undefined?b.type:-1, span, range:rangeStr(k,span), merged:span>1 });
                }
                return out;
            }

            // ── Now key ───────────────────────────
            function nowKey() {
                const d = new Date(), m = d.getHours()*60+d.getMinutes();
                const { interval, start, end } = state.config;
                const s=start*60, eM=end*60;
                if (m < s || m >= eM) return null;
                return toKey(s + Math.floor((m-s)/interval)*interval);
            }

            // ── Render sidebar ────────────────────
            function renderSidebar() {
                domTypeList.innerHTML = '';
                TASK_TYPES.forEach((tt, i) => {
                    const item = document.createElement('div');
                    item.className = 'task-type-item';
                    item.draggable = true;
                    item.dataset.typeIndex = i;

                    const dot = document.createElement('span');
                    dot.className = 'color-dot';
                    dot.style.background = tt.color;

                    const label = document.createElement('span');
                    label.textContent = tt.name;

                    item.append(dot, label);

                    item.addEventListener('dragstart', e => {
                        e.dataTransfer.setData('text/plain', String(i));
                        e.dataTransfer.effectAllowed = 'copy';
                        domDragOverlay.textContent = tt.name;
                        domDragOverlay.style.background = tt.color;
                        domDragOverlay.style.display = 'block';
                    });

                    item.addEventListener('drag', e => {
                        domDragOverlay.style.left = (e.clientX - 60) + 'px';
                        domDragOverlay.style.top = (e.clientY - 20) + 'px';
                    });

                    item.addEventListener('dragend', () => {
                        domDragOverlay.style.display = 'none';
                        $$('#schedule-grid .row.drop-target').forEach(r => r.classList.remove('drop-target'));
                    });

                    domTypeList.appendChild(item);
                });
            }

            // ── Render right panel (task list) ────
            function renderTasksList() {
                domTasksList.innerHTML = '';
                const list = visible();
                list.forEach(v => {
                    if (!v.task) return; // Skip empty tasks

                    const item = document.createElement('div');
                    item.className = 'task-item';
                    if (focused === v.k) item.classList.add('active');

                    const time = document.createElement('div');
                    time.className = 'task-item-time';
                    time.textContent = v.range;

                    const title = document.createElement('div');
                    title.className = 'task-item-title' + (v.task ? '' : ' empty');
                    title.textContent = v.task || '(Нет описания)';

                    const status = document.createElement('div');
                    status.className = 'task-item-status';
                    const statusText = v.status === 'completed' ? '✓ Выполнено' : 
                                       v.status === 'blocked' ? '⊘ Заблокировано' : 
                                       '◉ В работе';
                    status.textContent = statusText;

                    item.append(time, title, status);
                    item.addEventListener('click', () => {
                        focused = v.k;
                        sel.clear();
                        render();
                        renderTasksList();
                        // Scroll to the task in the grid
                        const row = document.querySelector(`[data-k="${v.k}"]`);
                        if (row) row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    });

                    domTasksList.appendChild(item);
                });
            }

            // ── Render grid ───────────────────────
            function render() {
                timeKeys = genKeys();
                const list = visible(), nk = nowKey();
                const frag = document.createDocumentFragment();
                list.forEach(v => {
                    const row = document.createElement('div');
                    row.className = 'row';
                    if (v.merged) row.classList.add('merged');
                    if (sel.has(v.k)) row.classList.add('selected');
                    if (focused === v.k) row.classList.add('focused');
                    if (v.k === nk) row.classList.add('now');
                    if (v.type >= 0 && v.type < 9) {
                        row.classList.add('type-' + v.type);
                        row.classList.add('has-tasktype');
                    }
                    row.dataset.k = v.k;
                    row.dataset.span = v.span;

                    // Make rows droppable for sidebar types and block move
                    row.addEventListener('dragover', e => {
                        e.preventDefault();
                        // Accept both sidebar type drop and block move
                        if (e.dataTransfer.types.includes('text/plain') || e.dataTransfer.types.includes('application/x-realtor-key')) {
                            e.dataTransfer.dropEffect = e.dataTransfer.types.includes('application/x-realtor-key') ? 'move' : 'copy';
                            $$('#schedule-grid .row.drop-target').forEach(r => r.classList.remove('drop-target'));
                            row.classList.add('drop-target');
                        }
                    });
                    row.addEventListener('dragleave', () => {
                        row.classList.remove('drop-target');
                    });
                    row.addEventListener('drop', e => {
                        e.preventDefault();
                        row.classList.remove('drop-target');
                        // Check for block move first
                        if (e.dataTransfer.types.includes('application/x-realtor-key')) {
                            const sourceKey = e.dataTransfer.getData('application/x-realtor-key');
                            if (sourceKey && sourceKey !== row.dataset.k) {
                                moveBlock(sourceKey, row.dataset.k);
                            }
                            return;
                        }

                        // Type was dropped
                        const typeStr = e.dataTransfer.getData('text/plain');
                        if (typeStr) {
                            const type = parseInt(typeStr, 10);
                            if (!isNaN(type) && type >= 0 && type < 9) {
                                state.blocks[v.k] = state.blocks[v.k] || {};
                                state.blocks[v.k].type = type;
                                save();
                                render();
                                renderTasksList();
                            }
                        }
                    });

                    row.addEventListener('click', e => {
                        const rect = row.getBoundingClientRect();
                        const isStatus = e.clientX > rect.right - 40;

                        if (isStatus) {
                            openModal(v.k);
                        } else {
                            if (e.ctrlKey || e.metaKey) {
                                sel.has(v.k) ? sel.delete(v.k) : sel.add(v.k);
                            } else if (e.shiftKey) {
                                const list = visible();
                                const fi = list.findIndex(x => x.k === focused);
                                const ci = list.findIndex(x => x.k === v.k);
                                if (fi >= 0 && ci >= 0) {
                                    const [s, e] = fi < ci ? [fi, ci] : [ci, fi];
                                    for (let i = s; i <= e; i++) sel.add(list[i].k);
                                }
                            } else {
                                sel.clear();
                                sel.add(v.k);
                            }
                            focused = v.k;
                        }
                        render();
                        renderTasksList();
                    });

                    row.addEventListener('dblclick', () => openModal(v.k));

                    // Time col
                    const tcol = document.createElement('div');
                    tcol.className = 'time-col';
                    const timeText = document.createTextNode(v.range);
                    tcol.appendChild(timeText);
                    if (v.merged) {
                        const badge = document.createElement('span');
                        badge.className = 'badge';
                        badge.textContent = `×${v.span}`;
                        tcol.appendChild(badge);
                    }

                    // Drag handle
                    const dh = document.createElement('span');
                    dh.className = 'drag-handle';
                    dh.textContent = '≡';
                    dh.draggable = true;
                    dh.addEventListener('dragstart', e => {
                        e.dataTransfer.setData('application/x-realtor-key', v.k);
                        e.dataTransfer.effectAllowed = 'move';
                        domDragOverlay.textContent = v.task || '(блок)';
                        domDragOverlay.style.background = 'rgba(0,0,0,0.4)';
                        domDragOverlay.style.display = 'block';
                    });
                    dh.addEventListener('drag', e => {
                        domDragOverlay.style.left = (e.clientX - 60) + 'px';
                        domDragOverlay.style.top = (e.clientY - 20) + 'px';
                    });
                    dh.addEventListener('dragend', () => {
                        domDragOverlay.style.display = 'none';
                    });
                    tcol.insertBefore(dh, tcol.firstChild);

                    row.appendChild(tcol);

                    // Task cell
                    const tc = document.createElement('div');
                    tc.className = 'task-col';

                    if (v.type >= 0 && v.type < 9) {
                        const label = document.createElement('div');
                        label.className = 'task-type-label type-label-' + v.type;
                        label.textContent = TASK_TYPES[v.type].name;
                        tc.appendChild(label);
                    }

                    const tdesc = document.createElement('div');
                    tdesc.className = 'task-desc' + (v.task ? '' : ' empty') + (v.status === 'completed' ? ' done' : '') + (v.status === 'blocked' ? ' blocked' : '');
                    tdesc.textContent = v.task || '(no task)';
                    tc.appendChild(tdesc);

                    if (v.metric) {
                        const ml = document.createElement('div');
                        ml.className = 'metric-line';
                        ml.textContent = v.metric;
                        tc.appendChild(ml);
                    }

                    // Status dot
                    const sd = document.createElement('div');
                    sd.className = 'status-dot s-' + v.status;
                    sd.textContent = v.status === 'completed' ? '✓' : v.status === 'blocked' ? '!' : '○';
                    sd.addEventListener('click', e => {
                        e.stopPropagation();
                        openModal(v.k);
                    });
                    tc.appendChild(sd);

                    row.appendChild(tc);
                    frag.appendChild(row);
                });

                domGrid.innerHTML = '';
                domGrid.appendChild(frag);

                updateMergeBar();
                updateBlockCount();
            }

            // ── Modal ─────────────────────────────
            function openModal(k) {
                modalKey = k;
                const b = state.blocks[k] || {};
                const span = b.span || 1;

                domMRange.textContent = rangeStr(k, span);
                domMTaskType.value = b.type !== undefined ? b.type : -1;
                domMTask.value = b.task || '';
                domMMetric.value = b.metric || '';
                domMStatus.value = b.status || 'pending';
                domMSplit.style.display = span > 1 ? 'block' : 'none';

                domModalOverlay.classList.add('open');
                domMTask.focus();
            }

            function closeModal() {
                domModalOverlay.classList.remove('open');
                modalKey = null;
            }

            function saveBlock() {
                if (modalKey !== null) {
                    const k = modalKey;
                    state.blocks[k] = state.blocks[k] || {};
                    state.blocks[k].type = parseInt(domMTaskType.value, 10);
                    state.blocks[k].task = domMTask.value;
                    state.blocks[k].metric = domMMetric.value;
                    state.blocks[k].status = domMStatus.value;
                    save();
                    closeModal();
                    render();
                    renderTasksList();
                }
            }

            function deleteBlock() {
                if (modalKey !== null) {
                    delete state.blocks[modalKey];
                    save();
                    closeModal();
                    render();
                    renderTasksList();
                }
            }

            function splitBlock() {
                if (modalKey !== null) {
                    const k = modalKey, b = state.blocks[k], span = b.span || 1;
                    if (span > 1) {
                        const half = Math.ceil(span / 2);
                        b.span = half;
                        state.blocks[add(k, half*state.config.interval)] = {
                            task: b.task,
                            metric: b.metric,
                            status: b.status,
                            type: b.type,
                            span: span - half
                        };
                        save();
                        closeModal();
                        render();
                        renderTasksList();
                    }
                }
            }

            function moveBlock(from, to) {
                if (from === to) return;
                const b = state.blocks[from];
                if (b) {
                    delete state.blocks[from];
                    state.blocks[to] = b;
                    save();
                    focused = to;
                    render();
                    renderTasksList();
                }
            }

            function updateBlockCount() {
                let cnt = 0;
                timeKeys.forEach(k => {
                    if (state.blocks[k]) cnt++;
                });
                domCnt.textContent = String(timeKeys.length - cnt);
            }

            function updateMergeBar() {
                if (sel.size > 1) {
                    domMCnt.textContent = String(sel.size);
                    domBar.classList.add('visible');
                } else {
                    domBar.classList.remove('visible');
                }
            }

            function mergeSelected() {
                if (sel.size < 2) return;
                const arr = Array.from(sel).sort((a, b) => toMin(a) - toMin(b));
                const start = arr[0];
                const span = arr.length;

                state.blocks[start] = state.blocks[start] || {};
                state.blocks[start].span = span;

                arr.slice(1).forEach(k => delete state.blocks[k]);
                sel.clear();
                focused = start;
                save();
                render();
                renderTasksList();
            }

            // ── Clock ─────────────────────────────
            function updateClock() {
                const d = new Date();
                const h = String(d.getHours()).padStart(2, '0');
                const m = String(d.getMinutes()).padStart(2, '0');
                domClock.textContent = h + ':' + m;
            }

            // ── Events ────────────────────────────
            domObj.addEventListener('change', () => {
                state.objective = domObj.value;
                save();
            });

            domInt.addEventListener('change', () => {
                state.config.interval = parseInt(domInt.value, 10);
                save();
                render();
                renderTasksList();
            });

            domStart.addEventListener('change', () => {
                state.config.start = parseInt(domStart.value, 10);
                save();
                render();
                renderTasksList();
            });

            domEnd.addEventListener('change', () => {
                state.config.end = parseInt(domEnd.value, 10);
                save();
                render();
                renderTasksList();
            });

            domBMerge.addEventListener('click', mergeSelected);
            domBCancel.addEventListener('click', () => {
                sel.clear();
                render();
            });

            domMSave.addEventListener('click', saveBlock);
            domMCancel.addEventListener('click', closeModal);
            domMDelete.addEventListener('click', deleteBlock);
            domMSplit.addEventListener('click', splitBlock);

            document.addEventListener('keydown', e => {
                if (domModalOverlay.classList.contains('open')) {
                    if (e.key === 'Escape') { e.preventDefault(); closeModal(); }
                    if (e.key === 'Enter') { e.preventDefault(); saveBlock(); }
                    return;
                }

                if (e.key === 'Escape') {
                    sel.clear();
                    focused = null;
                    render();
                    renderTasksList();
                } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    const list = visible();
                    const fi = focused !== null ? list.findIndex(x => x.k === focused) : -1;
                    const ni = e.key === 'ArrowDown' 
                        ? (fi < 0 ? 0 : Math.min(fi + 1, list.length - 1))
                        : (fi < 0 ? list.length - 1 : Math.max(fi - 1, 0));
                    if (ni >= 0) {
                        focused = list[ni].k;
                        sel.clear();
                        sel.add(focused);
                        render();
                        renderTasksList();
                    }
                } else if (e.key === 'Enter') {
                    if (focused !== null) openModal(focused);
                } else if (e.key === 'o' || e.key === 'O') {
                    e.preventDefault();
                    domObj.focus();
                } else if (e.key === 'c' || e.key === 'C') {
                    e.preventDefault();
                    domInt.focus();
                } else if (e.key === 'm' || e.key === 'M') {
                    e.preventDefault();
                    mergeSelected();
                }
            });

            // ── Init ──────────────────────────────
            domObj.value = state.objective;
            domInt.value = state.config.interval;
            domStart.value = state.config.start;
            domEnd.value = state.config.end;

            renderSidebar();
            render();
            renderTasksList();
            updateClock();

            setInterval(updateClock, 1000);
        })();
    </script>
</body>
</html>
