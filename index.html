<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>План · Риелтор</title>
    <style>
        /* ──────────────────────────────────────────
           Realtor Day Planner · dark design
           ────────────────────────────────────────── */
        :root {
            --bg-canvas: #111113;
            --bg-surface: #1a1a1e;
            --bg-raised: #232327;
            --bg-sidebar: #17171b;
            --text-title:  #f0f0f0;
            --text-body:   #d4d4d4;
            --text-muted:  #8a8a8a;
            --text-dim:    #5e5e66;
            --accent:      #7c5cfc;
            --accent-dim:  rgba(124, 92, 252, 0.10);
            --accent-glow: rgba(124, 92, 252, 0.20);
            --border:      #2c2c32;
            --border-focus:#4a4a54;
            --green:       #34d399;
            --green-dim:   rgba(52, 211, 153, 0.12);
            --amber:       #fbbf24;
            --amber-dim:   rgba(251, 191, 36, 0.12);
            --red:         #f87171;
            --red-dim:     rgba(248, 113, 113, 0.12);
            --font:        'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --font-ui:     -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 14px;
            --space-lg: 20px;
            --space-xl: 28px;
            --radius:    10px;
            --radius-sm: 6px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg-canvas);
            color: var(--text-body);
            font-family: var(--font);
            line-height: 1.55;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg-canvas); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }

        /* ── Layout: days-panel + sidebar + main + right-panel ───────────────────────── */
        #app {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--space-lg);
            display: flex;
            gap: var(--space-lg);
            min-height: 100vh;
        }

        /* ── Days Panel (Left-most) ───────────────────────── */
        #days-panel {
            width: 140px;
            min-width: 140px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-sm);
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
            height: fit-content;
            position: sticky;
            top: 20px;
        }

        #days-panel h2 {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            padding: var(--space-xs) var(--space-sm);
            margin-bottom: var(--space-xs);
            border-bottom: 1px solid var(--border);
        }

        #days-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }

        .day-item {
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.75rem;
            border: 1px solid transparent;
            transition: all 0.12s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
            background: var(--bg-surface);
            position: relative;
            overflow: hidden;
        }

        .day-item:hover {
            background: rgba(255,255,255,0.04);
            border-color: var(--border-focus);
        }

        .day-item.active {
            background: var(--accent-dim);
            border-color: var(--accent);
            font-weight: 600;
        }

        .day-item-date {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text-title);
        }

        .day-item-delete {
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.12s;
            cursor: pointer;
            color: var(--text-dim);
            font-size: 0.7rem;
            padding: 2px 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 3px;
        }

        .day-item:hover .day-item-delete {
            opacity: 1;
        }

        .day-item-delete:hover {
            background: var(--red-dim);
            color: var(--red);
        }

        #btn-add-day {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            background: var(--accent-dim);
            border: 1px solid var(--accent);
            color: var(--accent);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.12s;
            text-align: center;
            margin-top: auto;
        }

        #btn-add-day:hover {
            background: var(--accent);
            color: #fff;
        }

        /* ── Sidebar ──────────────────────────── */
        #sidebar {
            width: 200px;
            min-width: 200px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-md);
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        #sidebar h2 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            padding: var(--space-xs) var(--space-sm);
            margin-bottom: var(--space-xs);
            border-bottom: 1px solid var(--border);
        }
        .task-type-item {
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: grab;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-title);
            border: 1px solid transparent;
            transition: all 0.12s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .task-type-item:hover {
            border-color: var(--border-focus);
            background: rgba(255,255,255,0.02);
        }
        .task-type-item:active {
            cursor: grabbing;
            transform: scale(0.97);
        }
        .task-type-item .color-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── Main area ────────────────────────── */
        #main {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
            min-width: 0;
        }

        /* ── Header ───────────────────────────── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: var(--space-md);
            padding-bottom: var(--space-md);
            border-bottom: 1px solid var(--border);
        }
        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text-title);
        }
        #clock {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--accent);
            background: var(--accent-dim);
            padding: 6px 18px;
            border-radius: 20px;
            letter-spacing: 0.02em;
            border: 1px solid transparent;
        }

        /* ── Objective ────────────────────────── */
        #objective-box {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-md) var(--space-lg);
            display: flex;
            align-items: center;
            gap: var(--space-md);
            flex-wrap: wrap;
        }
        #objective-box label {
            font-weight: 500;
            font-size: 0.8rem;
            letter-spacing: 0.03em;
            color: var(--accent);
            white-space: nowrap;
        }
        #objective-input {
            flex: 1;
            min-width: 200px;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-title);
            font-family: var(--font);
            font-size: 1rem;
            padding: 4px 0;
            caret-color: var(--accent);
        }
        #objective-input::placeholder { color: var(--text-dim); }

        /* ── Config Bar ───────────────────────── */
        #config-bar {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            flex-wrap: wrap;
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-sm) var(--space-md);
            font-size: 0.85rem;
        }
        #config-bar label {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            white-space: nowrap;
        }
        #config-bar select,
        #config-bar input[type="number"] {
            background: var(--bg-raised);
            color: var(--text-title);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 6px 12px;
            font-family: var(--font-ui);
            font-size: 0.82rem;
            outline: none;
            cursor: pointer;
            transition: border-color 0.15s;
        }
        #config-bar select:focus,
        #config-bar input[type="number"]:focus { border-color: var(--accent); }
        #config-bar input[type="number"] { width: 50px; text-align: center; }
        #config-bar input[type="number"]::-webkit-outer-spin-button,
        #config-bar input[type="number"]::-webkit-inner-spin-button { opacity: 1; height: 28px; }
        #config-bar .sep { color: var(--border); }
        #config-bar .block-count {
            margin-left: auto;
            color: var(--text-dim);
            font-size: 0.75rem;
        }
        #config-bar .block-count span { color: var(--accent); font-weight: 600; }

        /* ── Grid ─────────────────────────────── */
        #workspace {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }
        #schedule-grid {
            max-height: 60vh;
            overflow-y: auto;
        }
        .row {
            display: flex;
            align-items: stretch;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background 0.1s;
            min-height: 52px;
        }
        .row:last-child { border-bottom: none; }
        .row:hover { background: rgba(255, 255, 255, 0.02); }
        .row.focused {
            background: var(--accent-dim);
            border-left: 3px solid var(--accent);
            z-index: 1;
        }
        .row.selected {
            background: var(--accent-dim);
            border-left: 3px solid var(--accent);
            z-index: 1;
        }
        .row.focused.selected { background: var(--accent-glow); }
        .row.now {
            box-shadow: inset 0 0 0 1px var(--accent);
            background: rgba(255, 255, 255, 0.01);
        }
        .row.merged { min-height: 50px; }

        .time-col {
            width: 130px;
            min-width: 130px;
            padding: 8px 12px;
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            border-right: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.15);
            gap: 6px;
        }
        .time-col .badge {
            font-size: 0.6rem;
            color: var(--accent);
            font-weight: 600;
            background: var(--accent-dim);
            padding: 1px 8px;
            border-radius: 4px;
            margin-left: 4px;
        }
        .drag-handle {
            cursor: grab;
            opacity: 0.45;
            font-size: 1rem;
            line-height: 1;
            user-select: none;
            padding: 0 2px;
            transition: opacity 0.12s;
        }
        .drag-handle:active { cursor: grabbing; opacity: 0.8; }
        .row:hover .drag-handle { opacity: 0.8; }

        /* ── Task Cell ────────────────────────── */
        .task-col {
            flex: 1;
            padding: 8px 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            min-width: 0;
            position: relative;
        }
        .task-type-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            line-height: 1.3;
        }
        .task-desc {
            font-size: 0.85rem;
            color: var(--text-title);
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .task-desc.empty {
            color: var(--text-dim);
            font-style: italic;
            font-size: 0.78rem;
        }
        .task-desc.done {
            color: var(--text-dim);
            text-decoration: line-through;
            text-decoration-color: rgba(255,255,255,0.2);
        }
        .task-desc.blocked { color: #d4b44a; }
        .metric-line {
            font-size: 0.72rem;
            color: var(--text-muted);
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .row.has-tasktype {
            border-left: 3px solid transparent;
        }

        /* ── Type colors ──────────────────────── */
        .type-0 { --type-color: #e74c3c; }   /* Встречи */
        .type-1 { --type-color: #3498db; }   /* Показы */
        .type-2 { --type-color: #2ecc71; }   /* Подборы */
        .type-3 { --type-color: #f39c12; }   /* Перезвоны */
        .type-4 { --type-color: #9b59b6; }   /* Соцсети */
        .type-5 { --type-color: #e67e22; }   /* Расклейка */
        .type-6 { --type-color: #1abc9c; }   /* Навыки продаж */
        .type-7 { --type-color: #e91e63; }   /* Звонки */
        .type-8 { --type-color: #f1c40f; }   /* Задатки/сделки */

        .row.type-0 {
            border-left: 3px solid var(--type-color);
            background: rgba(231, 76, 60, 0.07);
        }
        .row.type-1 {
            border-left: 3px solid var(--type-color);
            background: rgba(52, 152, 219, 0.07);
        }
        .row.type-2 {
            border-left: 3px solid var(--type-color);
            background: rgba(46, 204, 113, 0.07);
        }
        .row.type-3 {
            border-left: 3px solid var(--type-color);
            background: rgba(243, 156, 18, 0.07);
        }
        .row.type-4 {
            border-left: 3px solid var(--type-color);
            background: rgba(155, 89, 182, 0.07);
        }
        .row.type-5 {
            border-left: 3px solid var(--type-color);
            background: rgba(230, 126, 34, 0.07);
        }
        .row.type-6 {
            border-left: 3px solid var(--type-color);
            background: rgba(26, 188, 156, 0.07);
        }
        .row.type-7 {
            border-left: 3px solid var(--type-color);
            background: rgba(233, 30, 99, 0.07);
        }
        .row.type-8 {
            border-left: 3px solid var(--type-color);
            background: rgba(241, 196, 15, 0.07);
        }

        .type-label-0 { color: #e74c3c; }
        .type-label-1 { color: #3498db; }
        .type-label-2 { color: #2ecc71; }
        .type-label-3 { color: #f39c12; }
        .type-label-4 { color: #9b59b6; }
        .type-label-5 { color: #e67e22; }
        .type-label-6 { color: #1abc9c; }
        .type-label-7 { color: #e91e63; }
        .type-label-8 { color: #f1c40f; }

        /* Status dot in task cell */
        .status-dot {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.7rem;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.1s;
            position: absolute;
            top: 8px;
            right: 10px;
        }
        .status-dot.s-pending {
            color: var(--text-dim);
            border-color: var(--border-focus);
            background: transparent;
        }
        .status-dot.s-done {
            color: var(--green);
            border-color: var(--green);
            background: var(--green-dim);
        }
        .status-dot.s-blocked {
            color: var(--amber);
            border-color: var(--amber);
            background: var(--amber-dim);
        }

        /* ── Right Panel (Task List) ───────────────────────── */
        #right-panel {
            width: 220px;
            min-width: 220px;
            background: var(--bg-sidebar);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--space-md);
            display: flex;
            flex-direction: column;
            gap: var(--space-sm);
            height: fit-content;
            position: sticky;
            top: 20px;
            max-height: calc(100vh - 40px);
        }
        #right-panel h2 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            padding: var(--space-xs) var(--space-sm);
            margin-bottom: var(--space-xs);
            border-bottom: 1px solid var(--border);
        }
        #tasks-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }
        .task-item {
            padding: 8px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.75rem;
            border: 1px solid transparent;
            transition: all 0.12s;
            display: flex;
            flex-direction: column;
            gap: 2px;
            background: var(--bg-surface);
        }
        .task-item:hover {
            background: rgba(255,255,255,0.04);
            border-color: var(--border-focus);
        }
        .task-item.active {
            background: var(--accent-dim);
            border-color: var(--accent);
        }
        .task-item-time {
            font-weight: 600;
            color: var(--accent);
            font-size: 0.7rem;
        }
        .task-item-title {
            color: var(--text-title);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
        }
        .task-item-title.empty {
            color: var(--text-dim);
            font-style: italic;
        }
        .task-item-status {
            font-size: 0.65rem;
            color: var(--text-muted);
        }

        /* ── Merge Toolbar ────────────────────── */
        #merge-bar {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-raised);
            border: 1px solid var(--border-focus);
            border-radius: 14px;
            padding: 12px 22px;
            display: none;
            align-items: center;
            gap: 14px;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            font-size: 0.85rem;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        #merge-bar.visible { display: flex; }
        #merge-bar .count-label { color: var(--text-muted); }
        #merge-bar .count-label strong { color: var(--accent); }
        #merge-bar button {
            font-family: var(--font-ui);
            font-size: 0.8rem;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid transparent;
            transition: all 0.12s;
        }
        .btn-primary {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }
        .btn-primary:hover { box-shadow: 0 0 18px var(--accent-glow); }
        .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border-color: var(--border);
        }
        .btn-ghost:hover { color: var(--text-title); border-color: var(--text-muted); }

        /* ── Modal ────────────────────────────── */
        #modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        #modal-overlay.open { display: flex; }
        #modal {
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: var(--space-xl);
            width: 92%;
            max-width: 520px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
        }
        #modal h3 {
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--accent);
            margin: 0;
        }
        #modal .range { font-size: 0.85rem; color: var(--text-muted); }
        #modal label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            font-weight: 500;
            margin-top: 4px;
        }
        #modal input[type="text"],
        #modal select {
            width: 100%;
            background: var(--bg-surface);
            color: var(--text-title);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            font-family: var(--font-ui);
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.15s;
        }
        #modal input[type="text"]:focus,
        #modal select:focus { border-color: var(--accent); }
        #modal .actions {
            display: flex;
            gap: var(--space-sm);
            justify-content: flex-end;
            flex-wrap: wrap;
            margin-top: var(--space-sm);
        }
        #modal .actions button {
            font-family: var(--font-ui);
            font-size: 0.85rem;
            padding: 10px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            border: 1px solid transparent;
            transition: all 0.12s;
        }
        .btn-save {
            background: var(--accent);
            color: #fff;
        }
        .btn-save:hover { box-shadow: 0 0 16px var(--accent-glow); }
        .btn-split {
            background: transparent;
            color: var(--amber);
            border-color: rgba(251, 191, 36, 0.5);
        }
        .btn-split:hover { background: var(--amber-dim); border-color: var(--amber); }
        .btn-cancel {
            background: transparent;
            color: var(--text-muted);
            border-color: var(--border);
        }
        .btn-cancel:hover { color: var(--text-title); border-color: var(--text-muted); }
        .btn-delete {
            background: transparent;
            color: var(--red);
            border-color: rgba(248, 113, 113, 0.4);
            margin-right: auto;
        }
        .btn-delete:hover { background: var(--red-dim); border-color: var(--red); }

        /* ── Keyboard Hints ───────────────────── */
        #kbd-hint {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-dim);
            padding: 2px 0;
        }
        #kbd-hint kbd {
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1px 8px;
            font-family: var(--font-ui);
            font-size: 0.68rem;
            color: var(--text-muted);
        }

        /* ── Dragging overlay ─────────────────── */
        #drag-overlay {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            padding: 6px 16px;
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            font-weight: 600;
            color: #fff;
            opacity: 0.9;
            display: none;
            white-space: nowrap;
        }

        /* ── Drop indicator ───────────────────── */
        .row.drop-target {
            outline: 2px dashed var(--accent);
            outline-offset: -2px;
        }
        .row.drop-target-source {
            outline: 2px dashed var(--amber);
            outline-offset: -2px;
        }

        /* ── Responsive ───────────────────────── */
        @media (max-width: 1200px) {
            #days-panel {
                width: 120px;
                min-width: 120px;
            }
            .day-item {
                font-size: 0.7rem;
                padding: 6px 8px;
            }
        }
        @media (max-width: 1000px) {
            #right-panel {
                display: none;
            }
        }
        @media (max-width: 800px) {
            #app {
                flex-direction: column;
                padding: var(--space-md);
            }
            #days-panel {
                width: 100%;
                min-width: 100%;
                position: static;
                flex-direction: row;
                flex-wrap: wrap;
                padding: var(--space-sm);
                gap: 4px;
                max-height: 200px;
                overflow-y: auto;
            }
            #days-panel h2 {
                width: 100%;
                margin-bottom: 0;
            }
            #days-list {
                flex-direction: row;
                flex-wrap: wrap;
                width: 100%;
            }
            .day-item {
                flex: 0 1 auto;
            }
            #btn-add-day {
                width: 100%;
                margin-top: var(--space-sm);
            }
            #sidebar {
                width: 100%;
                min-width: 100%;
                position: static;
                flex-direction: row;
                flex-wrap: wrap;
                padding: var(--space-sm);
                gap: 4px;
            }
            #sidebar h2 {
                width: 100%;
                margin-bottom: 0;
            }
            .task-type-item {
                font-size: 0.75rem;
                padding: 5px 10px;
            }
            .time-col { width: 100px; min-width: 100px; font-size: 0.7rem; padding: 6px 8px; }
            .task-col { padding: 6px 10px; }
            .task-type-label { font-size: 0.65rem; }
            .task-desc { font-size: 0.78rem; }
            #schedule-grid { max-height: 50vh; }
            #modal { padding: var(--space-lg); }
            #merge-bar { bottom: 16px; padding: 10px 16px; gap: 8px; font-size: 0.75rem; }
        }
    </style>
</head>
<body>
    <!-- ── Drag Overlay ── -->
    <div id="drag-overlay"></div>

    <div id="app">
        <!-- ═══ DAYS PANEL ═══ -->
        <aside id="days-panel">
            <h2>Дни</h2>
            <div id="days-list"></div>
            <button id="btn-add-day">+ Новый</button>
        </aside>

        <!-- ═══ SIDEBAR ═══ -->
        <aside id="sidebar">
            <h2>Типы задач</h2>
            <div id="task-type-list"></div>
        </aside>

        <!-- ═══ MAIN ═══ -->
        <div id="main">
            <!-- ═══ HEADER ═══ -->
            <header>
                <h1>План · Риелтор</h1>
                <div id="clock">00:00</div>
            </header>

            <!-- ═══ OBJECTIVE ═══ -->
            <section id="objective-box">
                <label for="objective-input">✦ Цель дня</label>
                <input type="text" id="objective-input" placeholder="Какая главная цель сегодня?">
            </section>

            <!-- ═══ CONFIG ═══ -->
            <section id="config-bar">
                <label for="interval-select">Интервал</label>
                <select id="interval-select">
                    <option value="5">5 мин</option>
                    <option value="10">10 мин</option>
                    <option value="15">15 мин</option>
                    <option value="30">30 мин</option>
                </select>
                <label for="start-hour">С</label>
                <input type="number" id="start-hour" value="6" min="0" max="23">
                <span class="sep">:</span>
                <span style="color:var(--text-dim);font-size:0.75rem;">00</span>
                <label for="end-hour">До</label>
                <input type="number" id="end-hour" value="22" min="0" max="23">
                <span class="sep">:</span>
                <span style="color:var(--text-dim);font-size:0.75rem;">00</span>
                <span class="block-count">Блоков · <span id="block-count">192</span></span>
            </section>

            <!-- ═══ GRID ═══ -->
            <main id="workspace">
                <div id="schedule-grid">
                    <!-- generated by JS -->
                </div>
            </main>

            <!-- ═══ KEYBOARD HINTS ═══ -->
            <div id="kbd-hint">
                <kbd>↑↓</kbd> Навигация &nbsp;&nbsp;
                <kbd>Enter</kbd> Редактировать &nbsp;&nbsp;
                <kbd>O</kbd> Цель &nbsp;&nbsp;
                <kbd>C</kbd> Настройки &nbsp;&nbsp;
                <kbd>Esc</kbd> Сброс &nbsp;&nbsp;
                Перетащи блоки чтобы объединить &nbsp;&nbsp;
                <kbd>M</kbd> Слить &nbsp;&nbsp;
                <kbd>↕</kbd> ручка ≡ – перенести блок
            </div>
        </div>

        <!-- ═══ RIGHT PANEL (TASK LIST) ═══ -->
        <aside id="right-panel">
            <h2>Все задачи</h2>
            <div id="tasks-list">
                <!-- generated by JS -->
            </div>
        </aside>
    </div>

    <!-- ═══ MERGE TOOLBAR ═══ -->
    <div id="merge-bar">
        <span class="count-label"><strong id="merge-count">0</strong> выбрано</span>
        <button class="btn-primary" id="btn-merge">Объединить</button>
        <button class="btn-ghost" id="btn-merge-cancel">Отмена</button>
    </div>

    <!-- ═══ MODAL ═══ -->
    <div id="modal-overlay">
        <div id="modal">
            <h3>✎ Редактировать блок</h3>
            <div class="range" id="modal-range">08:00 – 08:05</div>

            <label for="modal-tasktype">Тип задачи</label>
            <select id="modal-tasktype">
                <option value="-1">— Без типа —</option>
                <option value="0">Встречи</option>
                <option value="1">Показы</option>
                <option value="2">Подборы</option>
                <option value="3">Перезвоны</option>
                <option value="4">Соцсети</option>
                <option value="5">Расклейка</option>
                <option value="6">Навыки продаж, переговоров</option>
                <option value="7">Звонки</option>
                <option value="8">Задатки/сделки</option>
            </select>

            <label for="modal-task">Задача</label>
            <input type="text" id="modal-task" placeholder="Что нужно сделать?">

            <label for="modal-metric">Успех / Результат</label>
            <input type="text" id="modal-metric" placeholder="Измеримый результат">

            <label for="modal-status">Статус</label>
            <select id="modal-status">
                <option value="pending">В работе</option>
                <option value="completed">Выполнено</option>
                <option value="blocked">Заблокировано</option>
            </select>
            <div class="actions">
                <button class="btn-delete" id="btn-modal-delete">Очистить</button>
                <button class="btn-split" id="btn-modal-split" style="display:none;">Разделить</button>
                <button class="btn-cancel" id="btn-modal-cancel">Отмена</button>
                <button class="btn-save" id="btn-modal-save">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // Realtor Day Planner with Multiple Days
            // ──────────────────────────────────────

            const STORAGE_KEY = 'realtor-plan-v2';

            // 9 task types (Russian)
            const TASK_TYPES = [
                { name: 'Встречи',                  color: '#e74c3c' },
                { name: 'Показы',                    color: '#3498db' },
                { name: 'Подборы',                   color: '#2ecc71' },
                { name: 'Перезвоны',                 color: '#f39c12' },
                { name: 'Соцсети',                   color: '#9b59b6' },
                { name: 'Расклейка',                 color: '#e67e22' },
                { name: 'Навыки продаж, переговоров', color: '#1abc9c' },
                { name: 'Звонки',                    color: '#e91e63' },
                { name: 'Задатки/сделки',             color: '#f1c40f' }
            ];

            const DEF_DAY = {
                objective: '',
                blocks: {}
            };

            const DEF_CONFIG = {
                interval: 5,
                start: 6,
                end: 22
            };

            // ── DOM refs ──────────────────────────
            const $ = s => document.querySelector(s);
            const $$ = s => document.querySelectorAll(s);

            const domDaysList = $('#days-list');
            const domBtnAddDay = $('#btn-add-day');
            const domClock = $('#clock');
            const domObj = $('#objective-input');
            const domInt = $('#interval-select');
            const domStart = $('#start-hour');
            const domEnd = $('#end-hour');
            const domGrid = $('#schedule-grid');
            const domCnt = $('#block-count');
            const domBar = $('#merge-bar');
            const domMCnt = $('#merge-count');
            const domBMerge = $('#btn-merge');
            const domBCancel = $('#btn-merge-cancel');
            const domModalOverlay = $('#modal-overlay');
            const domMRange = $('#modal-range');
            const domMTaskType = $('#modal-tasktype');
            const domMTask = $('#modal-task');
            const domMMetric = $('#modal-metric');
            const domMStatus = $('#modal-status');
            const domMSave = $('#btn-modal-save');
            const domMCancel = $('#btn-modal-cancel');
            const domMDelete = $('#btn-modal-delete');
            const domMSplit = $('#btn-modal-split');
            const domTypeList = $('#task-type-list');
            const domDragOverlay = $('#drag-overlay');
            const domTasksList = $('#tasks-list');

            // ── State ─────────────────────────────
            let allDays = loadAllDays();
            let currentDate = findLatestDay();
            let config = { ...DEF_CONFIG };
            let timeKeys = [];
            let sel = new Set();
            let focused = null;
            let dragStart = null, dragEnd = null, dragging = false, mouseDown = null, mouseDownAt = 0;
            let modalKey = null;
            let dragSourceKey = null;

            // ── Persistence: All Days ────────────────────────
            function loadAllDays() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const data = JSON.parse(raw);
                        return data.days || {};
                    }
                } catch (_) {}
                return {};
            }

            function saveAllDays() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({ days: allDays }));
                } catch (_) {}
            }

            function findLatestDay() {
                const dates = Object.keys(allDays);
                if (dates.length === 0) return new Date().toISOString().slice(0, 10);
                return dates.sort().pop();
            }

            function getCurrentDayData() {
                if (!allDays[currentDate]) {
                    allDays[currentDate] = JSON.parse(JSON.stringify(DEF_DAY));
                }
                return allDays[currentDate];
            }

            // ── Time helpers ──────────────────────
            function toMin(k) { const [h,m]=k.split(':').map(Number); return h*60+m; }
            function toKey(m) {
                const h = Math.floor(m/60)%24, mm = m%60;
                return String(h).padStart(2,'0')+':'+String(mm).padStart(2,'0');
            }
            function add(k, n) { return toKey(toMin(k) + n); }

            function genKeys() {
                const keys = [];
                for (let m = config.start*60; m < config.end*60; m += config.interval) keys.push(toKey(m));
                return keys;
            }

            function endKey(k, span) { return add(k, (span||1)*config.interval); }
            function rangeStr(k, span) { return `${k} – ${endKey(k,span)}`; }

            // ── Build visible ───��─────────────────
            function visible() {
                const keys = timeKeys;
                const dayData = getCurrentDayData();
                const out = [];
                let skip = 0;
                for (let i=0; i<keys.length; i++) {
                    if (skip > 0) { skip--; continue; }
                    const k = keys[i];
                    const b = dayData.blocks[k] || { task:'', metric:'', status:'pending', type:-1, span:1 };
                    const span = Math.max(1, Math.min(b.span||1, keys.length-i));
                    skip = span - 1;
                    out.push({ k, task:b.task||'', metric:b.metric||'', status:b.status||'pending', type:b.type!==undefined?b.type:-1, span, range:rangeStr(k,span), merged:span>1 });
                }
                return out;
            }

            // ── Now key ───────────────────────────
            function nowKey() {
                const d = new Date(), m = d.getHours()*60+d.getMinutes();
                let closest = null, dist = Infinity;
                for (const k of timeKeys) {
                    const km = toMin(k);
                    const d = Math.abs(km - m);
                    if (d < dist) { dist = d; closest = k; }
                }
                return closest;
            }

            // ── Days Panel ────────────────────────
            function renderDaysList() {
                domDaysList.innerHTML = '';
                const dates = Object.keys(allDays).sort();
                for (const date of dates) {
                    const item = document.createElement('div');
                    item.className = 'day-item' + (date === currentDate ? ' active' : '');
                    item.innerHTML = `
                        <div class="day-item-date">${formatDateDisplay(date)}</div>
                        <div class="day-item-delete">✕</div>
                    `;
                    item.querySelector('.day-item-date').addEventListener('click', () => switchDay(date));
                    item.querySelector('.day-item-delete').addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteDay(date);
                    });
                    domDaysList.appendChild(item);
                }
            }

            function formatDateDisplay(dateStr) {
                const d = new Date(dateStr + 'T00:00:00');
                const days = ['Вс', 'Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб'];
                const day = days[d.getDay()];
                const month = String(d.getDate()).padStart(2, '0');
                return `${day} ${month}`;
            }

            function switchDay(date) {
                currentDate = date;
                renderDaysList();
                refresh();
            }

            function addNewDay() {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                const newDate = tomorrow.toISOString().slice(0, 10);
                if (!allDays[newDate]) {
                    allDays[newDate] = JSON.parse(JSON.stringify(DEF_DAY));
                    saveAllDays();
                    currentDate = newDate;
                    renderDaysList();
                    refresh();
                }
            }

            function deleteDay(date) {
                if (Object.keys(allDays).length <= 1) {
                    alert('Нельзя удалить последний день');
                    return;
                }
                delete allDays[date];
                saveAllDays();
                if (currentDate === date) {
                    currentDate = findLatestDay();
                }
                renderDaysList();
                refresh();
            }

            // ── Rendering Grid ───────────────────
            function renderGrid() {
                domGrid.innerHTML = '';
                const rows = visible();
                const nk = nowKey();
                for (const row of rows) {
                    const r = document.createElement('div');
                    r.className = `row type-${row.type}`;
                    if (row.merged) r.classList.add('merged');
                    if (sel.has(row.k)) r.classList.add('selected');
                    if (focused === row.k) r.classList.add('focused');
                    if (row.k === nk) r.classList.add('now');
                    r.innerHTML = `
                        <div class="time-col">
                            <span class="drag-handle">≡</span>
                            ${row.k}
                            ${row.merged ? `<span class="badge">+${row.span-1}</span>` : ''}
                        </div>
                        <div class="task-col">
                            ${row.type >= 0 ? `<div class="task-type-label type-label-${row.type}">${TASK_TYPES[row.type].name}</div>` : ''}
                            <div class="task-desc ${!row.task ? 'empty' : ''} ${row.status === 'completed' ? 'done' : ''} ${row.status === 'blocked' ? 'blocked' : ''}">${row.task || '(пусто)'}</div>
                            ${row.metric ? `<div class="metric-line">${row.metric}</div>` : ''}
                            <div class="status-dot s-${row.status}"></div>
                        </div>
                    `;
                    r.addEventListener('click', (e) => clickRow(e, row.k));
                    r.addEventListener('mousedown', (e) => startDrag(e, row.k));
                    r.querySelector('.drag-handle').addEventListener('mousedown', (e) => startBlockDrag(e, row.k));
                    domGrid.appendChild(r);
                }
                updateTasksList();
            }

            // ── Row interactions ──────────────────
            function clickRow(e, k) {
                if (e.shiftKey) {
                    if (focused !== null) {
                        const rows = visible();
                        const focusIdx = rows.findIndex(r => r.k === focused);
                        const clickIdx = rows.findIndex(r => r.k === k);
                        const [start, end] = focusIdx < clickIdx ? [focusIdx, clickIdx] : [clickIdx, focusIdx];
                        for (let i=start; i<=end; i++) sel.add(rows[i].k);
                    } else {
                        sel.add(k);
                    }
                } else if (e.ctrlKey || e.metaKey) {
                    if (sel.has(k)) sel.delete(k);
                    else sel.add(k);
                } else {
                    sel.clear();
                    sel.add(k);
                }
                focused = k;
                renderGrid();
                updateMergeBar();
            }

            function startDrag(e, k) {
                if (e.target.classList.contains('drag-handle')) return;
                if (e.button !== 0) return;
                dragStart = k;
                mouseDown = e;
                mouseDownAt = Date.now();
            }

            function startBlockDrag(e, k) {
                if (e.button !== 0) return;
                e.stopPropagation();
                dragSourceKey = k;
                mouseDown = e;
                mouseDownAt = Date.now();
                dragging = false;
            }

            // ── Update config ─────────────────────
            domInt.addEventListener('change', (e) => { config.interval = Number(e.target.value); refresh(); });
            domStart.addEventListener('input', (e) => { config.start = Number(e.target.value); refresh(); });
            domEnd.addEventListener('input', (e) => { config.end = Number(e.target.value); refresh(); });

            // ── Tasks list ────────────────────────
            function updateTasksList() {
                domTasksList.innerHTML = '';
                const dayData = getCurrentDayData();
                const rows = visible();
                for (const row of rows) {
                    if (row.k === focused) {
                        const item = document.createElement('div');
                        item.className = 'task-item active';
                        item.innerHTML = `
                            <div class="task-item-time">${row.range}</div>
                            <div class="task-item-title ${!row.task ? 'empty' : ''}">${row.task || '(пусто)'}</div>
                            <div class="task-item-status">Статус: ${row.status === 'completed' ? 'Выполнено' : row.status === 'blocked' ? 'Заблокировано' : 'В работе'}</div>
                        `;
                        domTasksList.appendChild(item);
                    }
                }
            }

            // ── Objective & Clock ─────────────────
            domObj.addEventListener('input', (e) => {
                getCurrentDayData().objective = e.target.value;
                saveAllDays();
            });

            function updateUI() {
                const dayData = getCurrentDayData();
                domObj.value = dayData.objective || '';
                const now = new Date();
                domClock.textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
            }

            // ── Merge Bar ─────────────────────────
            function updateMergeBar() {
                if (sel.size > 1) {
                    domMCnt.textContent = sel.size;
                    domBar.classList.add('visible');
                } else {
                    domBar.classList.remove('visible');
                }
            }

            domBMerge.addEventListener('click', () => {
                if (sel.size < 2) return;
                const dayData = getCurrentDayData();
                const rows = visible();
                const skeys = Array.from(sel);
                const minIdx = rows.findIndex(r => r.k === skeys[0]);
                const maxIdx = rows.findIndex(r => skeys.includes(r.k));
                let totalSpan = 0;
                for (const sk of skeys) {
                    const r = rows.find(x => x.k === sk);
                    totalSpan += r.span;
                }
                const firstKey = skeys.sort((a,b) => toMin(a) - toMin(b))[0];
                const b = dayData.blocks[firstKey] || {};
                b.span = totalSpan;
                dayData.blocks[firstKey] = b;
                for (const sk of skeys) if (sk !== firstKey) delete dayData.blocks[sk];
                saveAllDays();
                sel.clear();
                renderGrid();
                updateMergeBar();
            });

            domBCancel.addEventListener('click', () => {
                sel.clear();
                renderGrid();
                updateMergeBar();
            });

            // ── Modal ──────────────────────────────
            function openModal(k) {
                const dayData = getCurrentDayData();
                const rows = visible();
                const row = rows.find(r => r.k === k);
                if (!row) return;
                modalKey = k;
                domMRange.textContent = row.range;
                const b = dayData.blocks[k] || {};
                domMTaskType.value = b.type !== undefined ? b.type : '-1';
                domMTask.value = b.task || '';
                domMMetric.value = b.metric || '';
                domMStatus.value = b.status || 'pending';
                domMSplit.style.display = row.span > 1 ? 'block' : 'none';
                domModalOverlay.classList.add('open');
            }

            domMSave.addEventListener('click', () => {
                const dayData = getCurrentDayData();
                const b = dayData.blocks[modalKey] || { span: 1 };
                b.type = Number(domMTaskType.value);
                b.task = domMTask.value;
                b.metric = domMMetric.value;
                b.status = domMStatus.value;
                dayData.blocks[modalKey] = b;
                saveAllDays();
                domModalOverlay.classList.remove('open');
                renderGrid();
            });

            domMCancel.addEventListener('click', () => domModalOverlay.classList.remove('open'));
            domMDelete.addEventListener('click', () => {
                delete getCurrentDayData().blocks[modalKey];
                saveAllDays();
                domModalOverlay.classList.remove('open');
                renderGrid();
            });

            // ── Keyboard ───────────────────────────
            document.addEventListener('keydown', (e) => {
                if (domModalOverlay.classList.contains('open')) return;
                const rows = visible();
                if (e.key === 'ArrowUp') {
                    if (focused === null && rows.length) focused = rows[0].k;
                    else {
                        const idx = rows.findIndex(r => r.k === focused);
                        if (idx > 0) focused = rows[idx-1].k;
                    }
                    sel.clear(); sel.add(focused);
                    e.preventDefault();
                } else if (e.key === 'ArrowDown') {
                    if (focused === null && rows.length) focused = rows[0].k;
                    else {
                        const idx = rows.findIndex(r => r.k === focused);
                        if (idx < rows.length - 1) focused = rows[idx+1].k;
                    }
                    sel.clear(); sel.add(focused);
                    e.preventDefault();
                } else if (e.key === 'Enter') {
                    if (focused !== null) openModal(focused);
                } else if (e.key === 'o' || e.key === 'O') {
                    domObj.focus();
                } else if (e.key === 'm' || e.key === 'M') {
                    if (sel.size > 1) domBMerge.click();
                } else if (e.key === 'Escape') {
                    sel.clear(); focused = null;
                    renderGrid();
                    updateMergeBar();
                }
                renderGrid();
                updateMergeBar();
                updateTasksList();
            });

            // ── Task Types Sidebar ──────────────────
            function renderTaskTypes() {
                domTypeList.innerHTML = '';
                for (let i=0; i<TASK_TYPES.length; i++) {
                    const t = TASK_TYPES[i];
                    const div = document.createElement('div');
                    div.className = 'task-type-item';
                    div.innerHTML = `<div class="color-dot" style="background:${t.color}"></div><span>${t.name}</span>`;
                    domTypeList.appendChild(div);
                }
            }

            // ── Refresh all ─────────────────────────
            function refresh() {
                timeKeys = genKeys();
                updateUI();
                renderGrid();
                domCnt.textContent = timeKeys.length;
            }

            // ── Days Button ─────────────────────────
            domBtnAddDay.addEventListener('click', addNewDay);

            // ── Init ──────────────────────────────
            renderTaskTypes();
            renderDaysList();
            refresh();
            setInterval(() => { domClock.textContent = new Date().toTimeString().slice(0,5); renderGrid(); }, 60000);
        })();
    </script>
</body>
</html>
